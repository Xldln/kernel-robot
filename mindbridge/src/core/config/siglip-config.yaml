model:
  path: /workspace/mindbridge/models/siglip2-so400m-patch14-224
  checkpoint: /workspace/mindbridge/models/weights/siglip/0702/model_siglip2_multiview_v2_best_eval.pt
  # # graph_info_file: /workspace/mindbridge/models/weights/siglip/graph_info_epoch20.json
  graph_info_file: /workspace/mindbridge/models/weights/siglip/0702/graph_info_best_eval.json
  # checkpoint: /workspace/mindbridge/models/weights/siglip/siglip_multi_626/siglip_gift_multi_m8_0625.pt
  # graph_info_file: /workspace/mindbridge/models/weights/siglip/siglip_multi_626/siglip_gift_multi_m8_0625.json
  # ── 多视角参数：网页 Camera=Multi 时会把三路图横向拼接后送入 SigLIP ──
  # checkpoint 中存在 view_pos_embed 时会自动启用 MultiViewSigLIPModel。
  # 若多视角权重没有该 key 但仍需强制多视角，可设 multiview: true。
  multiview: false
  num_views: 3
  num_query_tokens: 8
  pooler_num_layers: 2
  pooler_num_heads: 8
  background_mask_ratio: 0

ema:
  enabled: false
  beta: 0.7             # 稳定状态时的平滑系数
  adaptive: true         # 开启自适应 EMA：状态切换时自动加速
  adaptive_beta: 0.2     # 状态切换时的快速响应系数（越低响应越快）