# SAM3 目标检测 / 分割 服务配置

sam3:
  # ── 代码库路径（sam3 项目根目录） ──
  code_base: /workspace/mindbridge/models/sam3-main

  # ── 模型权重路径 ──
  # checkpoint_path: /workspace/mindbridge/models/weights/sam3/sam3_quantized.pt
  checkpoint_path: /workspace/mindbridge/models/weights/sam3/sam3.1_multiplex.pt
  # checkpoint_path: /workspace/mindbridge/models/weights/sam3/sam3.pt
  # ── 推理参数 ──
  prompts:
    - gift bag
    - yellow figurine
    - yellow long tassel
    - cuboid box
    - black box
    # - black rectangle
    
    # - tiny object
    # - object
  score_threshold: 0.45
  processor_confidence_threshold: 0.45 # SAM3 内部阈值，默认 0.5 太高会漏检
